services:
  postgres:
    image: postgres:15-alpine
    container_name: echotype_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: echotype
      POSTGRES_PASSWORD: echotype
      POSTGRES_DB: echotype
    volumes:
      - echotype_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echotype -d echotype"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  echotype_pgdata:
